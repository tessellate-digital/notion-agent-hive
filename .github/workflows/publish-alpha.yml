name: Publish Alpha

on:
  push:
    branches-ignore:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  publish-alpha:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set alpha version from branch
        id: alpha
        run: |
          BASE_VERSION=$(jq -r .version package.json)
          # Sanitize branch name: replace non-alphanumeric chars with hyphens, trim edges
          BRANCH_RAW="${GITHUB_REF_NAME}"
          BRANCH_CLEAN=$(echo "$BRANCH_RAW" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          ALPHA_VERSION="${BASE_VERSION}-${BRANCH_CLEAN}"
          echo "version=$ALPHA_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing alpha version: $ALPHA_VERSION"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set alpha version in package.json
        run: npm version "${{ steps.alpha.outputs.version }}" --no-git-tag-version

      - name: Publish alpha
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public --tag alpha
